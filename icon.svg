<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <rect width="512" height="512" fill="#0a0a1a" rx="100"/>
    
    <!-- Glow effect -->
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- T Piece (Magenta) -->
    <g filter="url(#glow)">
        <rect x="128" y="150" width="85" height="85" fill="#ff00e5" rx="15"/>
        <rect x="213" y="150" width="85" height="85" fill="#ff00e5" rx="15"/>
        <rect x="298" y="150" width="85" height="85" fill="#ff00e5" rx="15"/>
        <rect x="213" y="235" width="85" height="85" fill="#ff00e5" rx="15"/>
    </g>
    
    <!-- S Piece (Green/Cyan mix for contrast) -->
    <g filter="url(#glow)">
        <rect x="128" y="320" width="85" height="85" fill="#00e5ff" rx="15"/>
        <rect x="213" y="320" width="85" height="85" fill="#00e5ff" rx="15"/>
        <rect x="213" y="235" width="85" height="85" fill="#00e5ff" rx="15"/>
        <rect x="298" y="235" width="85" height="85" fill="#00e5ff" rx="15"/>
    </g>
    
    <!-- Inner highlights for 3D look (T Piece) -->
    <rect x="133" y="155" width="75" height="75" fill="rgba(255,255,255,0.3)" rx="10"/>
    <rect x="218" y="155" width="75" height="75" fill="rgba(255,255,255,0.3)" rx="10"/>
    <rect x="303" y="155" width="75" height="75" fill="rgba(255,255,255,0.3)" rx="10"/>
    <rect x="218" y="240" width="75" height="75" fill="rgba(255,255,255,0.3)" rx="10"/>
    
    <!-- Inner highlights for 3D look (S Piece) -->
    <rect x="133" y="325" width="75" height="75" fill="rgba(255,255,255,0.3)" rx="10"/>
    <rect x="218" y="325" width="75" height="75" fill="rgba(255,255,255,0.3)" rx="10"/>
    <rect x="303" y="240" width="75" height="75" fill="rgba(255,255,255,0.3)" rx="10"/>
    <rect x="218" y="240" width="75" height="75" fill="rgba(255,255,255,0.3)" rx="10"/>
</svg>
